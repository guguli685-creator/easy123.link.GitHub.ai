<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>123 云盘链接转换器</title>

    <style>
        :root {
            --surface: rgba(255, 255, 255, 0.88);
            --surface-soft: #f8fafc;

            --text-main: #0f172a;
            --text-sub: #475569;
            --text-soft: #64748b;
            --text-faint: #94a3b8;

            --brand: #2563eb;
            --brand-hover: #1d4ed8;
            --brand-soft: #dbeafe;

            --success: #10b981;
            --success-soft: #ecfdf5;
            --error-soft: #fef2f2;

            --border: #e2e8f0;
            --border-strong: #cbd5e1;

            --radius-xl: 28px;
            --radius-lg: 22px;
            --radius-md: 14px;

            --shadow-card: 0 24px 70px rgba(15, 23, 42, 0.08);
            --shadow-button: 0 8px 18px rgba(37, 99, 235, 0.22);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            color: var(--text-main);
            background:
                radial-gradient(circle at top left, rgba(37, 99, 235, 0.14), transparent 32%),
                radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.10), transparent 30%),
                linear-gradient(135deg, #f8fafc, #eef2ff 52%, #f8fafc);
            font-family:
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                "PingFang SC",
                "Microsoft YaHei",
                "Inter",
                Roboto,
                Arial,
                sans-serif;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        button,
        textarea {
            font: inherit;
        }

        button {
            border: none;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .page {
            width: min(1080px, calc(100% - 40px));
            min-height: 100vh;
            margin: 0 auto;
            padding: 82px 0 36px;
        }

        .hero {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(420px, 480px);
            align-items: center;
            gap: 48px;
        }

        .hero-copy {
            min-width: 0;
        }

        h1 {
            max-width: 620px;
            color: var(--text-main);
            font-size: clamp(42px, 5vw, 64px);
            line-height: 1.06;
            letter-spacing: -0.06em;
            font-weight: 840;
        }

        .hero-desc {
            max-width: 560px;
            margin-top: 20px;
            color: var(--text-sub);
            font-size: 17px;
            line-height: 1.8;
        }

        .hero-desc strong {
            color: var(--brand);
            font-weight: 760;
        }

        .tool-card {
            width: 100%;
            position: relative;
            padding: 22px;
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.76);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-card);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            overflow: hidden;
        }

        .tool-card::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            border-radius: inherit;
            background: linear-gradient(
                135deg,
                rgba(255, 255, 255, 0.78),
                transparent 42%,
                rgba(37, 99, 235, 0.06)
            );
        }

        .tool-inner {
            position: relative;
            z-index: 1;
        }

        .tool-header {
            margin-bottom: 18px;
        }

        .tool-title {
            font-size: 22px;
            font-weight: 820;
            letter-spacing: -0.035em;
        }

        .tool-subtitle {
            margin-top: 7px;
            color: var(--text-soft);
            font-size: 14px;
            line-height: 1.6;
        }

        .field-label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
            color: var(--text-sub);
            font-size: 13px;
            font-weight: 750;
        }

        .field-hint {
            color: var(--text-faint);
            font-size: 12px;
            font-weight: 650;
            white-space: nowrap;
        }

        textarea {
            width: 100%;
            min-height: 128px;
            max-height: 320px;
            resize: vertical;
            padding: 15px 16px;
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            outline: none;
            box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.03);
            font-size: 14px;
            line-height: 1.72;
            word-break: break-all;
            transition:
                border-color 0.2s ease,
                box-shadow 0.2s ease,
                background 0.2s ease;
        }

        textarea::placeholder {
            color: var(--text-faint);
        }

        textarea:focus {
            background: #ffffff;
            border-color: rgba(37, 99, 235, 0.72);
            box-shadow:
                0 0 0 4px rgba(37, 99, 235, 0.12),
                inset 0 1px 2px rgba(15, 23, 42, 0.03);
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            margin-top: 12px;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 46px;
            padding: 0 16px;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 14px;
            font-weight: 760;
            transition:
                transform 0.18s ease,
                background 0.18s ease,
                border-color 0.18s ease,
                box-shadow 0.18s ease;
            user-select: none;
        }

        .button:active {
            transform: translateY(1px) scale(0.99);
        }

        .button-primary {
            color: #ffffff;
            background: var(--brand);
            box-shadow: var(--shadow-button);
        }

        .button-primary:hover {
            background: var(--brand-hover);
        }

        .button-secondary {
            color: var(--text-sub);
            background: #ffffff;
            border: 1px solid var(--border);
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.04);
        }

        .button-secondary:hover {
            color: var(--text-main);
            border-color: var(--border-strong);
            background: var(--surface-soft);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 16px 0;
        }

        .stat-card {
            padding: 12px;
            background: rgba(248, 250, 252, 0.84);
            border: 1px solid rgba(226, 232, 240, 0.92);
            border-radius: var(--radius-md);
        }

        .stat-value {
            color: var(--text-main);
            font-size: 20px;
            font-weight: 830;
            letter-spacing: -0.04em;
        }

        .stat-label {
            margin-top: 3px;
            color: var(--text-soft);
            font-size: 12px;
            font-weight: 650;
        }

        .empty-state {
            margin-top: 16px;
            padding: 14px 16px;
            color: var(--text-soft);
            background: rgba(255, 255, 255, 0.66);
            border: 1px dashed rgba(148, 163, 184, 0.56);
            border-radius: var(--radius-md);
            font-size: 13px;
            line-height: 1.7;
        }

        .result-panel {
            display: none;
            margin-top: 16px;
            overflow: hidden;
            background: rgba(248, 250, 252, 0.88);
            border: 1px solid rgba(226, 232, 240, 0.96);
            border-radius: var(--radius-lg);
        }

        .result-panel.show {
            display: block;
            animation: appear 0.2s ease;
        }

        .result-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px;
            border-bottom: 1px solid rgba(226, 232, 240, 0.92);
        }

        .result-title {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .result-title strong {
            font-size: 14px;
            font-weight: 780;
        }

        .result-title span {
            color: var(--text-soft);
            font-size: 12px;
            font-weight: 620;
        }

        .copy-all {
            min-height: 36px;
            padding: 0 12px;
            color: #047857;
            background: #ffffff;
            border: 1px solid rgba(16, 185, 129, 0.28);
            border-radius: 999px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 760;
            transition: 0.18s ease;
            white-space: nowrap;
        }

        .copy-all:hover {
            background: var(--success-soft);
        }

        .result-list {
            max-height: 310px;
            overflow-y: auto;
            padding: 10px;
        }

        .result-list::-webkit-scrollbar {
            width: 8px;
        }

        .result-list::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 999px;
        }

        .result-item {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: center;
            gap: 10px;
            padding: 10px 10px 10px 12px;
            margin-bottom: 8px;
            background: #ffffff;
            border: 1px solid rgba(226, 232, 240, 0.94);
            border-radius: var(--radius-md);
            box-shadow: 0 6px 16px rgba(15, 23, 42, 0.035);
        }

        .result-item:last-child {
            margin-bottom: 0;
        }

        .result-url {
            min-width: 0;
            color: var(--brand);
            font-size: 13px;
            font-weight: 650;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            user-select: all;
        }

        .item-actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .mini-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 32px;
            padding: 0 10px;
            color: var(--text-sub);
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 999px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 740;
            white-space: nowrap;
            transition: 0.18s ease;
        }

        .mini-button:hover {
            color: var(--text-main);
            background: var(--surface-soft);
            border-color: var(--border-strong);
        }

        .mini-button.copy {
            color: var(--brand);
        }

        .mini-button.copy:hover {
            background: var(--brand-soft);
            border-color: rgba(37, 99, 235, 0.28);
        }

        .toast {
            display: none;
            margin-top: 14px;
            padding: 12px 14px;
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 700;
            line-height: 1.5;
            animation: appear 0.18s ease;
        }

        .toast.success {
            display: block;
            color: #047857;
            background: var(--success-soft);
            border: 1px solid rgba(16, 185, 129, 0.22);
        }

        .toast.error {
            display: block;
            color: #b91c1c;
            background: var(--error-soft);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        @keyframes appear {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 980px) {
            .page {
                width: min(760px, calc(100% - 32px));
                padding-top: 64px;
            }

            .hero {
                grid-template-columns: 1fr;
                gap: 30px;
                align-items: start;
            }

            .hero-desc {
                max-width: none;
            }
        }

        @media (max-width: 640px) {
            .page {
                width: min(100% - 24px, 760px);
                padding: 56px 0 24px;
            }

            h1 {
                font-size: clamp(40px, 12vw, 52px);
                line-height: 1.05;
                letter-spacing: -0.055em;
                max-width: 6em;
            }

            .hero-desc {
                margin-top: 16px;
                font-size: 15px;
                line-height: 1.72;
            }

            .tool-card {
                padding: 16px;
                border-radius: 24px;
            }

            .tool-title {
                font-size: 21px;
            }

            .tool-subtitle {
                font-size: 13px;
            }

            .field-label {
                align-items: flex-start;
                flex-direction: column;
                gap: 4px;
            }

            textarea {
                min-height: 118px;
                padding: 14px;
                font-size: 13px;
            }

            .actions {
                grid-template-columns: 1fr;
            }

            .button {
                width: 100%;
            }

            .stats {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }

            .stat-card {
                padding: 10px;
            }

            .stat-value {
                font-size: 18px;
            }

            .stat-label {
                font-size: 11px;
            }

            .result-head {
                align-items: flex-start;
                flex-direction: column;
            }

            .copy-all {
                width: 100%;
            }

            .result-item {
                grid-template-columns: 1fr;
                align-items: stretch;
            }

            .result-url {
                white-space: normal;
                overflow-wrap: anywhere;
                line-height: 1.55;
            }

            .item-actions {
                justify-content: flex-end;
            }

            .mini-button {
                flex: 1;
            }
        }

        @media (max-width: 380px) {
            h1 {
                font-size: 40px;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            .item-actions {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <main class="page">
        <section class="hero">
            <div class="hero-copy">
                <h1>链接转换器</h1>

                <p class="hero-desc">
                    批量提取混合文本中的 123 云盘分享链接，自动转换为
                    <strong>www.123pan.cn</strong>
                    格式，并保留提取码。
                </p>
            </div>

            <section class="tool-card" id="tool">
                <div class="tool-inner">
                    <div class="tool-header">
                        <div class="tool-title">批量转换</div>
                        <div class="tool-subtitle">粘贴文本后自动识别链接。</div>
                    </div>

                    <div class="input-area">
                        <label class="field-label" for="bulkUrls">
                            <span>原始文本</span>
                            <span class="field-hint">支持多行与混合文本</span>
                        </label>

                        <textarea
                            id="bulkUrls"
                            placeholder="请输入需要转换的 123 云盘链接或混合文本..."
                            autocomplete="off"
                            spellcheck="false"
                        ></textarea>

                        <div class="actions">
                            <button class="button button-primary" id="convertBtn" type="button">
                                立即转换
                            </button>
                            <button class="button button-secondary" id="clearBtn" type="button">
                                清空内容
                            </button>
                        </div>
                    </div>

                    <div class="stats" aria-label="转换统计">
                        <div class="stat-card">
                            <div class="stat-value" id="totalCount">0</div>
                            <div class="stat-label">识别链接</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="uniqueCount">0</div>
                            <div class="stat-label">去重结果</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="pwdCount">0</div>
                            <div class="stat-label">含提取码</div>
                        </div>
                    </div>

                    <div class="empty-state" id="emptyState">
                        转换结果会显示在这里。
                    </div>

                    <section class="result-panel" id="resultPanel" aria-live="polite">
                        <div class="result-head">
                            <div class="result-title">
                                <strong>转换结果</strong>
                                <span id="resultSummary">暂无结果</span>
                            </div>
                            <button class="copy-all" id="copyAllBtn" type="button">复制全部</button>
                        </div>

                        <div class="result-list" id="resultList"></div>
                    </section>

                    <div class="toast" id="toast"></div>
                </div>
            </section>
        </section>
    </main>

    <script>
        const state = {
            processedUrls: [],
            matchedCount: 0,
            pwdCount: 0
        };

        const els = {
            input: document.getElementById("bulkUrls"),
            convertBtn: document.getElementById("convertBtn"),
            clearBtn: document.getElementById("clearBtn"),
            copyAllBtn: document.getElementById("copyAllBtn"),

            totalCount: document.getElementById("totalCount"),
            uniqueCount: document.getElementById("uniqueCount"),
            pwdCount: document.getElementById("pwdCount"),

            emptyState: document.getElementById("emptyState"),
            resultPanel: document.getElementById("resultPanel"),
            resultSummary: document.getElementById("resultSummary"),
            resultList: document.getElementById("resultList"),
            toast: document.getElementById("toast")
        };

        function normalizeText(text) {
            return text
                .replace(/？/g, "?")
                .replace(/＆/g, "&")
                .replace(/＝/g, "=")
                .replace(/（/g, "(")
                .replace(/）/g, ")")
                .replace(/(https?:\/\/)/gi, "\n$1")
                .replace(/(\/(?:s|123pan)\/)/gi, "\n$1");
        }

        function extractUrls(inputText) {
            const text = normalizeText(inputText);
            const linkPattern = /(?:https?:\/\/[^\s"'<>，。；、\[\]{}()]*)?(?:\/s\/|\/123pan\/)([a-zA-Z0-9-]+)/gi;
            const results = new Map();

            let matchedCount = 0;
            let match;

            while ((match = linkPattern.exec(text)) !== null) {
                const shareId = match[1];

                if (!shareId) {
                    continue;
                }

                matchedCount++;

                const start = match.index;
                const afterMatchStart = start + match[0].length;
                const tail = text.slice(afterMatchStart);

                const nextLinkIndex = tail.search(/https?:\/\/|\/(?:s|123pan)\//i);
                const safeEnd = nextLinkIndex >= 0
                    ? afterMatchStart + nextLinkIndex
                    : Math.min(text.length, afterMatchStart + 160);

                const localChunk = text.slice(start, safeEnd);

                const pwdFromQuery = localChunk.match(/[?&]pwd=([a-zA-Z0-9]+)/i);
                const pwdFromText = localChunk.match(/(?:提取码|访问码|密码|pwd)\s*[:：=]?\s*([a-zA-Z0-9]{1,12})/i);

                const pwd = pwdFromQuery?.[1] || pwdFromText?.[1] || "";
                const url = pwd
                    ? `https://www.123pan.cn/s/${shareId}?pwd=${pwd}`
                    : `https://www.123pan.cn/s/${shareId}`;

                if (!results.has(url)) {
                    results.set(url, {
                        url,
                        hasPwd: Boolean(pwd)
                    });
                }
            }

            const processedUrls = Array.from(results.values());
            const pwdCount = processedUrls.filter(item => item.hasPwd).length;

            return {
                processedUrls,
                matchedCount,
                pwdCount
            };
        }

        function convertUrls() {
            const inputText = els.input.value.trim();

            if (!inputText) {
                resetResults();
                showToast("请输入需要转换的 123 云盘文本内容", "error");
                return;
            }

            const result = extractUrls(inputText);

            state.processedUrls = result.processedUrls;
            state.matchedCount = result.matchedCount;
            state.pwdCount = result.pwdCount;

            updateStats();

            if (state.processedUrls.length === 0) {
                els.emptyState.style.display = "block";
                els.resultPanel.classList.remove("show");
                showToast("未识别到有效的 123 云盘链接", "error");
                return;
            }

            renderResults();
            showToast(`成功转换 ${state.processedUrls.length} 条链接`, "success");
        }

        function renderResults() {
            els.resultList.innerHTML = "";

            state.processedUrls.forEach(item => {
                const row = document.createElement("div");
                row.className = "result-item";

                const text = document.createElement("div");
                text.className = "result-url";
                text.title = item.url;
                text.textContent = item.url;

                const actions = document.createElement("div");
                actions.className = "item-actions";

                const openLink = document.createElement("a");
                openLink.className = "mini-button";
                openLink.href = item.url;
                openLink.target = "_blank";
                openLink.rel = "noopener noreferrer";
                openLink.textContent = "打开";

                const copyBtn = document.createElement("button");
                copyBtn.className = "mini-button copy";
                copyBtn.type = "button";
                copyBtn.textContent = "复制";
                copyBtn.addEventListener("click", () => {
                    copyText(item.url, "已复制单个链接");
                });

                actions.appendChild(openLink);
                actions.appendChild(copyBtn);

                row.appendChild(text);
                row.appendChild(actions);

                els.resultList.appendChild(row);
            });

            els.emptyState.style.display = "none";
            els.resultPanel.classList.add("show");
            els.resultSummary.textContent =
                `${state.processedUrls.length} 条结果，${state.pwdCount} 条包含提取码`;
        }

        function updateStats() {
            els.totalCount.textContent = state.matchedCount;
            els.uniqueCount.textContent = state.processedUrls.length;
            els.pwdCount.textContent = state.pwdCount;
        }

        function resetResults() {
            state.processedUrls = [];
            state.matchedCount = 0;
            state.pwdCount = 0;

            updateStats();

            els.resultList.innerHTML = "";
            els.resultPanel.classList.remove("show");
            els.emptyState.style.display = "block";
            els.resultSummary.textContent = "暂无结果";
        }

        function clearAll() {
            els.input.value = "";
            resetResults();
            showToast("已清空内容", "success");
            els.input.focus();
        }

        async function copyText(text, successMessage) {
            try {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(text);
                } else {
                    const copied = fallbackCopy(text);

                    if (!copied) {
                        throw new Error("fallback copy failed");
                    }
                }

                showToast(successMessage, "success");
            } catch (err) {
                const copied = fallbackCopy(text);

                showToast(
                    copied ? successMessage : "复制失败，请手动选择文本复制",
                    copied ? "success" : "error"
                );
            }
        }

        function fallbackCopy(text) {
            const textarea = document.createElement("textarea");
            textarea.value = text;
            textarea.setAttribute("readonly", "");
            textarea.style.position = "fixed";
            textarea.style.top = "-9999px";
            textarea.style.left = "-9999px";

            document.body.appendChild(textarea);
            textarea.select();

            let copied = false;

            try {
                copied = document.execCommand("copy");
            } catch (err) {
                copied = false;
            }

            document.body.removeChild(textarea);
            return copied;
        }

        function copyAllToClipboard() {
            if (state.processedUrls.length === 0) {
                showToast("当前没有可复制的结果", "error");
                return;
            }

            const text = state.processedUrls.map(item => item.url).join("\n");
            copyText(text, "已复制全部链接");
        }

        function showToast(message, type) {
            els.toast.textContent = message;
            els.toast.className = `toast ${type}`;

            window.clearTimeout(showToast.timer);

            showToast.timer = window.setTimeout(() => {
                els.toast.className = "toast";
                els.toast.textContent = "";
            }, 2600);
        }

        els.convertBtn.addEventListener("click", convertUrls);
        els.clearBtn.addEventListener("click", clearAll);
        els.copyAllBtn.addEventListener("click", copyAllToClipboard);

        els.input.addEventListener("keydown", event => {
            if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
                convertUrls();
            }
        });
    </script>
</body>
</html>
